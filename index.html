<!DOCTYPE html>
<html lang="en" data-theme="cool">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pathways Explorer: The Future of Law to 2040</title>
<meta name="description" content="An interactive navigation instrument for the Pathways scenario project. Three questions, eight possible worlds, four built in detail.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23fff'/><g fill='none' stroke='%230a0a0a' stroke-width='6'><polygon points='50,18 78,34 78,66 50,82 22,66 22,34'/><path d='M50 18 V50 M50 50 L78 34 M50 50 L22 34'/></g><circle cx='50' cy='18' r='7' fill='%23FF0000'/></svg>">
<meta property="og:type" content="website">
<meta property="og:title" content="Pathways Explorer: The Future of Law to 2040">
<meta property="og:description" content="An interactive navigation instrument for the Pathways scenario project. Three questions, two answers each, eight possible worlds, four built in detail.">
<meta property="og:url" content="https://pathways.kenpriore.ai/explorer/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Pathways Explorer: The Future of Law to 2040">
<meta name="twitter:description" content="Three questions, eight possible worlds, four built in detail. Explore the Pathways scenarios for the business of law in 2040.">
<style>
  :root{
    /* ---- Signal primaries (locked) ---- */
    --c-red:#FF0000; --c-blue:#0057B8; --c-yellow:#FFCC00;
    /* ---- Signal categorical = the four scenario accents ---- */
    --c-cat-1:#E5006D; --c-cat-2:#0E7C7B; --c-cat-3:#6A3FA0; --c-cat-4:#1F4E9B;
    /* ---- neutrals (cool / white theme) ---- */
    --paper:#ffffff; --ink:#0a0a0a; --ink-soft:#3a3a3a; --muted:#6f6f6f;
    --hairline:#e4e4e4; --line-firm:var(--ink); --fill-soft:#f4f4f2;
    /* ---- semantic roles ---- */
    --signal:var(--c-red); --emphasis:var(--c-blue); --caution:var(--c-yellow);
    --on-signal:#ffffff; --on-caution:var(--ink);
    /* ---- type: Archivo leads (free Helvetica Neue substitute), HN kept in fallback. No webfont @import, to stay offline / self-contained. ---- */
    --font-sans:"Archivo","Helvetica Neue","Helvetica Neue LT Std",Helvetica,Arial,system-ui,sans-serif;
    --font-mono:"SFMono-Regular","SF Mono",Consolas,"Liberation Mono",Menlo,monospace;
    --fs-display:clamp(40px,7vw,88px); --fs-h1:clamp(30px,4.5vw,52px); --fs-h2:clamp(22px,3vw,32px); --fs-h3:clamp(17px,2vw,21px);
    --fs-body:16px; --fs-small:13px; --fs-caption:11px; --fs-kicker:11px;
    --lh-tight:1.05; --lh-snug:1.2; --lh-body:1.5;
    --fw-bold:700; --fw-black:800;
    --tr-tight:-0.02em; --tr-kicker:0.22em; --tr-caps:0.12em;
    /* ---- rule weights (heavy solid rules = the signature) ---- */
    --rule-hairline:1px; --rule-base:2px; --rule-firm:3px; --rule-heavy:4px; --rule-poster:6px; --radius:0;
    /* ---- spacing (4px base) ---- */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px; --sp-9:96px;
    --inset:clamp(20px,5vw,72px);
    /* ---- motion (metronomic beat; decisive easing only) ---- */
    --beat:480ms; --beat-half:240ms; --beat-2:960ms; --stagger:80ms;
    --ease-cut:cubic-bezier(.2,.8,.2,1); --ease-snap:cubic-bezier(.85,0,.15,1); --ease-anticipate:cubic-bezier(.5,-0.4,.2,1);
    /* ---- grid ---- */
    --grid-cols:6; --container-max:1180px;
    /* ---- back-compat aliases (existing rules reference these names) ---- */
    --ink2:var(--ink-soft); --mute:var(--muted); --grid:var(--hairline); --soft:var(--fill-soft); --line:var(--ink);
    --blue:var(--c-blue); --yellow:var(--c-yellow); --red:var(--c-red);
    --s1:var(--c-cat-1); --s2:var(--c-cat-2); --s3:var(--c-cat-3); --s4:var(--c-cat-4);
    --sans:var(--font-sans); --mono:var(--font-mono); --max:var(--container-max);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:var(--fs-body);line-height:var(--lh-body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit}
  button{font-family:inherit}
  h1,h2,h3,h4{margin:0;font-weight:800;letter-spacing:-0.02em;line-height:1.05}
  p{margin:0 0 1em}
  ::selection{background:var(--yellow);color:var(--ink)}

  /* ---------- chrome ---------- */
  header.top{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:3px solid var(--line);display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}
  .brand{display:flex;flex-direction:row;align-items:center;gap:12px;padding:12px 20px;border-right:3px solid var(--line)}
  .brand-tx{display:flex;flex-direction:column;justify-content:center}
  .brand-cube{width:30px;height:30px;color:var(--ink);flex:none}
  /* ---------- signal icons ---------- */
  .icon{width:24px;height:24px;color:var(--ink);display:inline-block;vertical-align:middle;flex:none}
  .icon-16{width:16px;height:16px}
  /* ---------- signal moves (build / beat) ---------- */
  @keyframes sig-rise{from{transform:translateY(22px)}to{transform:translateY(0)}}
  .m-build>*{animation:sig-rise var(--beat) var(--ease-cut) backwards}
  .m-build>*:nth-child(2){animation-delay:var(--stagger)}
  .m-build>*:nth-child(3){animation-delay:calc(var(--stagger)*2)}
  .m-build>*:nth-child(4){animation-delay:calc(var(--stagger)*3)}
  .m-build>*:nth-child(5){animation-delay:calc(var(--stagger)*4)}
  .m-build>*:nth-child(6){animation-delay:calc(var(--stagger)*5)}
  @keyframes sig-beat{0%,70%,100%{transform:scale(1)}80%{transform:scale(1.16)}}
  .m-beat{animation:sig-beat var(--beat-2) var(--ease-snap) infinite;transform-origin:center}
  .brand .pj{font-weight:800;font-size:18px;letter-spacing:0.16em;text-transform:uppercase}
  .brand .sub{font:600 10px/1.3 var(--mono);text-transform:uppercase;letter-spacing:0.12em;color:var(--mute);margin-top:2px}
  nav.modes{display:flex;flex-wrap:wrap}
  nav.modes button{background:var(--paper);border:0;border-left:1px solid var(--grid);padding:10px 16px;font:700 11px/1 var(--sans);text-transform:uppercase;letter-spacing:var(--tr-caps);color:var(--ink2);cursor:pointer;transition:background var(--beat-half) var(--ease-cut),color var(--beat-half) var(--ease-cut)}
  nav.modes button .n{color:var(--mute);margin-right:7px}
  nav.modes button:hover{background:var(--soft)}
  nav.modes button.active{background:var(--ink);color:#fff}
  nav.modes button.active .n{color:var(--yellow)}

  main{max-width:var(--max);margin:0 auto;padding:36px 20px 80px;position:relative}
  main::before{content:"";position:absolute;inset:0 20px;pointer-events:none;z-index:0;opacity:.5;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/6 - 1px),var(--grid) calc(100%/6 - 1px),var(--grid) calc(100%/6))}
  main>.mode{position:relative;z-index:1}
  .mode{animation:m-cut-up var(--beat) var(--ease-cut) both}
  @keyframes m-cut-up{from{transform:translateY(14px)}to{transform:translateY(0)}}

  /* ---------- type helpers ---------- */
  .kicker{font:700 11px/1 var(--sans);text-transform:uppercase;letter-spacing:var(--tr-kicker);color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .kicker .bar{height:1px;background:var(--line);flex:1}
  .kicker b{color:var(--ink)}
  h1.big{font-size:clamp(30px,5vw,52px);line-height:1.04;margin:0 0 14px}
  h1.big .hl{color:var(--blue)}
  .lede{font-size:clamp(17px,2.2vw,21px);line-height:1.4;color:var(--ink2);margin:0 0 26px}
  .sub-kicker{font:800 13px/1 var(--sans);text-transform:uppercase;letter-spacing:var(--tr-caps);border-bottom:var(--rule-firm) solid var(--line);padding-bottom:8px;margin:0 0 18px;display:flex;align-items:center;gap:10px}
  /* tabular numerals on every figure (Signal) */
  .drift-val,.pf-n,.tyear,.ptier .pt-p,.sl-val,.cell-num,.w-num,nav.modes button .n,.mg-cap,.foot-meta,.readout-coords{font-variant-numeric:tabular-nums}

  /* ---------- motion graphics ---------- */
  .mg-fig{margin:0 0 26px;border:2px solid var(--ink);background:var(--paper)}
  .mg{position:relative;width:100%;overflow:hidden}
  .mg-canvas{display:block;width:100%}
  .mg-cap{font:600 11px/1.4 var(--mono);color:var(--mute);padding:9px 14px;border-top:1px solid var(--grid);letter-spacing:0.02em}

  /* ---------- provenance ---------- */
  .prov{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;font:700 10px/1 var(--mono);vertical-align:middle;border:1.5px solid var(--ink);cursor:help;flex:0 0 auto}
  .prov.S{background:var(--ink);color:#fff}
  .prov.I{background:#fff;color:var(--ink)}
  .prov.A{background:#fff;color:var(--ink);border-style:dashed}

  /* ---------- toggles ---------- */
  .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:0 0 30px}
  .toggle .toggle-label{font:700 11px/1 var(--mono);text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);margin-bottom:7px}
  .toggle-hint{font:400 15px/1.55 var(--sans);color:var(--ink);margin-top:13px}
  .toggle-hint strong{font-weight:700}
  .controls.nav-q{gap:16px}
  .nav-q .toggle{border:2px solid var(--ink);padding:16px 16px 18px;background:var(--paper)}
  .seg{display:flex;border:2px solid var(--ink)}
  .seg-btn{flex:1;background:var(--paper);border:0;border-left:2px solid var(--ink);padding:12px 8px;font:700 12px/1.2 var(--sans);letter-spacing:0.01em;cursor:pointer;color:var(--ink2);transition:background var(--beat-half) var(--ease-cut),color var(--beat-half) var(--ease-cut)}
  .seg-btn:first-child{border-left:0}
  .seg-btn:hover{background:var(--soft)}
  .seg-btn.on{background:var(--ink);color:#fff}
  .seg-btn.on.red{background:var(--red);color:#fff}

  /* ---------- navigator ---------- */
  .nav-layout{display:grid;grid-template-columns:1.35fr 1fr;gap:26px;align-items:start}
  .cube-wrap{display:flex;gap:18px;align-items:stretch}
  .plane{flex:1;border:2px solid var(--grid);padding:12px;transition:opacity .3s ease, transform .3s ease, border-color .3s ease;background:var(--paper)}
  .plane.active{border-color:var(--ink)}
  .plane.dim{opacity:0.5}
  .plane-label{font:800 13px/1 var(--mono);text-transform:uppercase;letter-spacing:0.08em;display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
  .plane.active .plane-label .hs{color:var(--red)}
  .plane-label .plane-sub{font:600 9px/1.2 var(--mono);color:var(--mute);letter-spacing:0.06em}
  .grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:7px}
  .corner{}
  .col-h{font:700 9px/1.1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--mute);align-self:end;padding:0 2px 4px;text-align:center}
  .row-h{font:700 9px/1.1 var(--mono);text-transform:uppercase;letter-spacing:0.05em;color:var(--mute);align-self:center;max-width:58px}
  .cell{position:relative;text-align:left;min-height:92px;padding:9px;border:2px solid var(--grid);background:var(--paper);cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:transform .15s ease, box-shadow .15s ease;color:var(--ink)}
  .cell:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--grid)}
  .cell.developed{border-color:var(--ink);border-top:7px solid var(--accent)}
  .cell.empty{border-style:dashed;background:repeating-linear-gradient(45deg,#fff,#fff 7px,#fafafa 7px,#fafafa 14px)}
  .cell.selected{box-shadow:0 0 0 3px var(--ink);transform:translateY(-2px)}
  .cell .cell-num{font:700 9px/1 var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--mute)}
  .cell.developed .cell-num{color:var(--accent)}
  .cell .cell-title{font-weight:800;font-size:13px;line-height:1.12}
  .cell .cell-foot{margin-top:auto;font:600 9px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--mute)}
  .cell.selected::after{content:"";position:absolute;top:6px;right:6px;width:9px;height:9px;background:var(--ink);border-radius:50%}
  .cell.developed.selected::after{background:var(--accent)}
  .skew-note{margin-top:16px;font-size:13px;color:var(--ink2);display:flex;gap:8px;align-items:flex-start;border-left:3px solid var(--yellow);padding-left:12px}

  .readout{border:2px solid var(--ink);padding:20px;position:sticky;top:96px}
  .readout.exhaust{border-color:var(--red)}
  .readout-coords{font:700 11px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--mute);margin-bottom:12px}
  .readout-tag{display:inline-block;font:800 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.08em;padding:5px 8px;background:var(--accent,var(--ink));color:#fff;margin-bottom:12px}
  .readout-tag.empty{background:#fff;color:var(--ink);border:1.5px dashed var(--ink)}
  .readout.exhaust .readout-tag.empty{color:var(--red);border-color:var(--red)}
  .readout-title{font-size:20px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
  .readout-glance{font-size:14px;color:var(--ink2);margin-bottom:14px}
  .readout-why{font-size:13px;color:var(--ink2);border-top:1px solid var(--grid);padding-top:12px}

  .btn{display:inline-flex;align-items:center;gap:8px;border:var(--rule-base) solid var(--ink);background:var(--ink);color:#fff;padding:12px 16px;font:700 11px/1 var(--sans);text-transform:uppercase;letter-spacing:var(--tr-caps);cursor:pointer;text-decoration:none;transition:background var(--beat-half) var(--ease-cut),color var(--beat-half) var(--ease-cut)}
  .btn:hover{background:#fff;color:var(--ink)}
  .btn.ghost{background:#fff;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:#fff}
  .btn.sm{padding:8px 12px;font-size:11px}

  /* ---------- worlds index ---------- */
  .world-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:40px}
  .wcard{border:2px solid var(--ink);border-top:9px solid var(--accent);padding:20px;display:flex;flex-direction:column;cursor:pointer;background:var(--paper);transition:transform .15s,box-shadow .15s}
  .wcard:hover{transform:translateY(-3px);box-shadow:7px 7px 0 var(--grid)}
  .wcard .wn{font:800 11px/1 var(--mono);letter-spacing:0.1em;color:var(--accent);text-transform:uppercase}
  .wcard h3{font-size:21px;margin:8px 0 12px}
  .wcard .wglance{font-size:14px;color:var(--ink2);flex:1;margin-bottom:16px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .chip{font:700 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.05em;border:1.5px solid var(--ink2);color:var(--ink2);padding:5px 7px}
  .chip.red{border-color:var(--red);color:var(--red)}
  .empty-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .ecard{border:2px dashed var(--ink);padding:16px;background:repeating-linear-gradient(45deg,#fff,#fff 7px,#fafafa 7px,#fafafa 14px)}
  .ecard.exhaust{border-color:var(--red)}
  .ecard .et{font:800 11px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
  .ecard.exhaust .et{color:var(--red)}
  .ecard .eo{font-size:13px;color:var(--ink2)}

  /* ---------- world detail ---------- */
  .backlink{font:700 11px/1 var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--mute);background:none;border:0;cursor:pointer;padding:0;margin-bottom:18px}
  .backlink:hover{color:var(--ink)}
  .w-head{border-bottom:3px solid var(--line);padding-bottom:22px;margin-bottom:26px}
  .w-num{font:800 13px/1 var(--mono);letter-spacing:0.12em;text-transform:uppercase;color:var(--accent)}
  .w-title{font-size:clamp(26px,4vw,40px);line-height:1.1;margin:10px 0 16px}
  .w-glance{font-size:18px;line-height:1.4;color:var(--ink2)}
  .section{margin:0 0 40px}
  .prose{font-size:16px;line-height:1.6;color:var(--ink2)}
  .profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--grid);border:1px solid var(--grid)}
  .pcell{background:var(--paper);padding:14px}
  .pcell .pl{font:700 9px/1 var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--mute);margin-bottom:7px}
  .pcell .pv{font-size:14px;font-weight:600}
  .quotes{display:flex;flex-direction:column;gap:14px;margin:0 0 22px}
  blockquote{margin:0;border-left:5px solid var(--accent);padding:6px 0 6px 18px;font-size:19px;font-weight:700;line-height:1.25;letter-spacing:-0.01em}
  .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grid);border:1px solid var(--grid)}
  .tcol{background:var(--paper);padding:16px}
  .tyear{font:800 18px/1 var(--mono);margin-bottom:12px;color:var(--accent)}
  .tcol ul{margin:0;padding:0;list-style:none}
  .tcol li{font-size:13px;line-height:1.4;color:var(--ink2);padding:8px 0;border-top:1px solid var(--grid)}
  .tcol li:first-child{border-top:0}
  .hiw{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .hiw-block .hb-t{font:800 11px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;border-bottom:2px solid var(--line);padding-bottom:7px}
  .hiw-block ul{margin:0;padding:0;list-style:none}
  .hiw-block li{font-size:14px;line-height:1.45;padding:7px 0 7px 16px;position:relative;color:var(--ink2)}
  .hiw-block li::before{content:"";position:absolute;left:0;top:13px;width:7px;height:7px;background:var(--accent)}
  .pyramid{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:8px}
  .ptier{color:#fff;text-align:center;padding:12px;font-weight:700}
  .ptier .pt-t{font:800 11px/1 var(--mono);letter-spacing:0.1em}
  .ptier .pt-l{font-size:13px;margin-top:3px;font-weight:600}
  .ptier .pt-p{font:800 16px/1 var(--mono);margin-top:5px}
  .qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .qcard{border:2px solid var(--ink);padding:16px}
  .qcard .ql{font:700 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.06em;color:var(--mute);margin-bottom:9px}
  .qcard .qv{font-size:15px;font-weight:600;line-height:1.35}
  .w-foot{display:flex;justify-content:space-between;gap:12px;border-top:3px solid var(--line);padding-top:20px;margin-top:10px}

  /* ---------- arc ---------- */
  .funnel{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:36px}
  .stage{border:2px solid var(--ink);padding:0;display:flex;flex-direction:column}
  .stage-h{background:var(--ink);color:#fff;padding:14px 16px}
  .stage-h .sm{font:700 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.1em;color:var(--yellow)}
  .stage-h .st{font-size:19px;font-weight:800;margin-top:5px}
  .stage-h .sd{font:600 10px/1.2 var(--mono);color:#bdbdbd;margin-top:6px;letter-spacing:0.04em}
  .stage-b{padding:14px 16px;flex:1}
  .stage-b .item{font-size:13px;line-height:1.35;padding:8px 0;border-top:1px solid var(--grid);color:var(--ink2)}
  .stage-b .item:first-child{border-top:0}
  .stage-b .item b{color:var(--ink)}
  .stage-w{display:flex;align-items:center;justify-content:center;height:8px;background:var(--soft);position:relative}
  .throughline{border:1px solid var(--grid)}
  .tl-row{display:grid;grid-template-columns:1.1fr 1.1fr 1fr;gap:1px;background:var(--grid)}
  .tl-row>div{background:var(--paper);padding:11px 13px;font-size:13px}
  .tl-row.head>div{background:var(--ink);color:#fff;font:700 10px/1 var(--mono);text-transform:uppercase;letter-spacing:0.07em}
  .tl-row .fin{font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer}
  .tl-row .fin:hover{text-decoration:underline}
  .dotc{width:11px;height:11px;flex:0 0 auto}

  /* ---------- signals ---------- */
  .drift{border:2px solid var(--ink);padding:18px;margin-bottom:28px}
  .drift-row{display:flex;align-items:center;gap:12px;margin:9px 0}
  .drift-name{width:264px;flex:0 0 auto;white-space:nowrap;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
  @media (max-width:760px){ .drift-name{width:140px;white-space:normal;font-size:11px} }
  .drift-track{flex:1;height:22px;background:var(--soft);position:relative;overflow:hidden}
  .drift-fill{height:100%;width:0;background:var(--accent);transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .drift-val{width:30px;text-align:right;font:800 13px/1 var(--mono)}
  .horizons{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .hcol{border:2px solid var(--ink)}

      "summary": "By 2040, human judgment sits above a deeply integrated legal technology system. Legal work across business, courts, regulators and everyday workflows is faster, cheaper and more automated. But humans still set values, own accountability and override the machine where trust, fairness, fiduciary judgment and legitimacy are at stake. This model emerged through disruption, not design. Technology and market demand moved faster than the legal system could control. The old guild tried to defend the boundaries of legal work, but users routed around anything that simply blocked speed, access or usefulness. Then the technology hit its own limits: jagged-edge failures, trust breaches and high-stakes judgment calls exposed the need for humans who could grab the stick. By 2040, corporate legal does not own the legal operating layer, but it has held onto the judgment, permissions and business context that matter most. Legal teams are smaller and more senior, focused on escalation, risk ownership and human decision making, while the guild has reinvented itself around licensed legal engineers, legal intelligence orchestrators, rule of law strategists and human translators. The promise is legal capability embedded everywhere. The tension is whether the humans on top have the skill, trust and independence to challenge the systems they rely on.",

function el(tag, attrs){
  var node = document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      var v = attrs[k];
      if(v==null || v===false) continue;
      if(k==='class') node.className=v;
      else if(k==='text') node.textContent=v;
      else if(k==='html') node.innerHTML=v;
      else if(k==='style' && typeof v==='object'){ for(var s in v) node.style.setProperty(s, v[s]); }
      else if(k.slice(0,2)==='on' && typeof v==='function') node.addEventListener(k.slice(2).toLowerCase(), v);

    }
  }
  for(var i=2;i<arguments.length;i++){ append(node, arguments[i]); }
  return node;
}
function append(node, kid){

/* Three Horizons: full curves + sweeping time playhead */

    ctx.strokeStyle='#efefef'; B.forEach(function(b){ C.forEach(function(c){ ctx.beginPath(); ctx.moveTo(bx,b.y); ctx.lineTo(cx,c.y); ctx.stroke(); }); });
    A.forEach(function(a){ if(a.dev){ ctx.fillStyle=a.color; ctx.fillRect(ax-5,a.y-5,10,10); } else { ctx.strokeStyle=PAL.mute; ctx.setLineDash([3,3]); ctx.strokeRect(ax-5,a.y-5,10,10); ctx.setLineDash([]); } });
    B.forEach(function(b){ ctx.fillStyle=b.color; ctx.fillRect(bx-6,b.y-6,12,12); });
    C.forEach(function(c){ ctx.fillStyle=PAL.ink; ctx.fillRect(cx-5,c.y-5,10,10); });

    ctx.fillText('8 EMERGED', ax, topY-11); ctx.fillText('4 BUILT', bx, topY-11); ctx.fillText('4 STRATEGIES', cx, topY-11); ctx.textAlign='left';
    var devs=A.filter(function(a){ return a.dev; }), emps=A.filter(function(a){ return !a.dev; });
    if(!reduced){
      if(t-spawnT>0.14){ spawnT=t;
        var a=devs[Math.floor(Math.random()*devs.length)]; parts.push({x0:ax,y0:a.y,x1:bx,y1:B[wIdx(a.world)].y,color:a.color,birth:t,dur:1.2});
        if(Math.random()<0.5){ var e=emps[Math.floor(Math.random()*emps.length)]; parts.push({x0:ax,y0:e.y,x1:lerp(ax,bx,0.45),y1:e.y,color:PAL.mute,birth:t,dur:1.0,fade:true}); }
        var b=B[Math.floor(Math.random()*4)], c=C[Math.floor(Math.random()*4)]; parts.push({x0:bx,y0:b.y,x1:cx,y1:c.y,color:b.color,birth:t,dur:1.2,light:true});

    parts.forEach(function(pp){ var p=pp.fix!=null?pp.fix:clamp((t-pp.birth)/pp.dur,0,1); var px=lerp(pp.x0,pp.x1,p), py=lerp(pp.y0,pp.y1,p); ctx.globalAlpha=pp.fade?(1-p):(pp.light?0.5:0.9); ctx.fillStyle=pp.color; ctx.fillRect(px-2.5,py-2.5,5,5); ctx.globalAlpha=1; });
  };

/* per-world signature headers (one canvas move per scenario) */
function makeWorldS1(color){
  return function(ctx,W,H,t,reduced){
    var pad=16, cols=Math.max(10, Math.round((W-2*pad)/36)), rows=4;
    var cw=(W-2*pad)/cols, ch=(H-2*pad)/rows, sz=Math.min(cw,ch)-6;
    var orow=Math.floor(rows/2), ocol=0;
    var maxd=Math.sqrt(Math.pow(cols-1-ocol,2)+Math.pow(Math.max(orow,rows-1-orow),2));
    var p=reduced?1:clamp((t%4.6)/3.3,0,1), front=easeInOut(p)*maxd;
    for(var r=0;r<rows;r++){ for(var c=0;c<cols;c++){
      var cx=pad+c*cw+cw/2, cy=pad+r*ch+ch/2, d=Math.sqrt(Math.pow(c-ocol,2)+Math.pow(r-orow,2));
      if(d<=front){ var edge=d>front-0.9; ctx.fillStyle=edge?PAL.ink:color; ctx.globalAlpha=edge?1:0.9; ctx.fillRect(cx-sz/2,cy-sz/2,sz,sz); ctx.globalAlpha=1; }
      else { ctx.strokeStyle=PAL.grid; ctx.lineWidth=1.4; ctx.strokeRect(cx-sz/2,cy-sz/2,sz,sz); }
    }}
    var ocx=pad+ocol*cw+cw/2, ocy=pad+orow*ch+ch/2;
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2; ctx.strokeRect(ocx-sz/2-2,ocy-sz/2-2,sz+4,sz+4);
  };
}
function makeWorldS2(color){
  var sats=null;
  return function(ctx,W,H,t,reduced){
    var cx=W*0.5, cy=H*0.5;
    if(!sats){ sats=[]; var n=11; for(var i=0;i<n;i++){ var a=(i/n)*Math.PI*2+(i%2?0.25:-0.18); sats.push({a:a, rx:W*(0.16+(i%3)*0.07), ry:H*(0.20+(i%3)*0.10)}); } }
    var sweep=reduced?Math.PI*2:(t*1.3)%(Math.PI*2);
    sats.forEach(function(s){
      var sx=cx+Math.cos(s.a)*s.rx, sy=cy+Math.sin(s.a)*s.ry;
      var ang=(((sweep-s.a)%(Math.PI*2))+Math.PI*2)%(Math.PI*2), connected=reduced||ang<Math.PI*1.8;
      if(connected){ ctx.strokeStyle=color; ctx.globalAlpha=0.45; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(sx,sy); ctx.stroke(); ctx.globalAlpha=1; ctx.fillStyle=color; ctx.fillRect(sx-4,sy-4,8,8); }
      else { ctx.strokeStyle=PAL.mute; ctx.lineWidth=1.6; ctx.strokeRect(sx-4,sy-4,8,8); }
    });
    if(!reduced){ ctx.strokeStyle=PAL.grid; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(sweep)*W*0.45, cy+Math.sin(sweep)*H*0.45); ctx.stroke(); }
    ctx.fillStyle=PAL.ink; ctx.fillRect(cx-7,cy-7,14,14); ctx.fillStyle=color; ctx.fillRect(cx-3,cy-3,6,6);
  };
}
function makeWorldS3(color){
  var nodes=null, targets=null;
  return function(ctx,W,H,t,reduced){
    if(!targets){
      var px=Math.max(64, W*0.17), ty=H*0.40;
      targets=[{x:px, label:'LAW FIRMS', kind:'firm'},{x:W/2, label:'LEGAL TECH', kind:'chip'},{x:W-px, label:'BIG TECH', kind:'server'}];
      targets.forEach(function(g){ g.y=ty; });
      nodes=[]; for(var i=0;i<18;i++) nodes.push({sx:18+((i*61)%100)/100*(W-36), sy:16+((i*37)%100)/100*(H-34), k:i%3});
    }
    var p=reduced?1:easeInOut(clamp((t%5.6)/3.8,0,1));
    nodes.forEach(function(nd){ var g=targets[nd.k], x=lerp(nd.sx,g.x,p), y=lerp(nd.sy,g.y,p);
      ctx.globalAlpha=lerp(0.8,0,clamp((p-0.6)/0.4,0,1)); ctx.fillStyle=color; ctx.fillRect(x-3,y-3,6,6); ctx.globalAlpha=1; });
    targets.forEach(function(g){
      drawS3Icon(ctx, g.kind, g.x, g.y, color);
      ctx.fillStyle=PAL.ink; ctx.font='700 9px '+MONO; ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText(g.label, g.x, g.y+18);
    });
    ctx.textAlign='left';
  };
}
function drawS3Icon(ctx, kind, x, y, col){
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=2; ctx.lineJoin='miter'; ctx.lineCap='butt';
  if(kind==='firm'){
    ctx.beginPath(); ctx.moveTo(x-12,y-4); ctx.lineTo(x,y-13); ctx.lineTo(x+12,y-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-13,y-4); ctx.lineTo(x+13,y-4); ctx.stroke();
    for(var i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(x+i*5.5,y-3); ctx.lineTo(x+i*5.5,y+8); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(x-13,y+9); ctx.lineTo(x+13,y+9); ctx.stroke();
  } else if(kind==='chip'){
    var s=8; ctx.strokeRect(x-s,y-s,2*s,2*s); ctx.strokeRect(x-3.5,y-3.5,7,7);
    for(var j=-1;j<=1;j++){ var q=j*4.5;
      ctx.beginPath(); ctx.moveTo(x-s,y+q); ctx.lineTo(x-s-3,y+q); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+s,y+q); ctx.lineTo(x+s+3,y+q); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+q,y-s); ctx.lineTo(x+q,y-s-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+q,y+s); ctx.lineTo(x+q,y+s+3); ctx.stroke(); }
  } else {
    for(var k=0;k<3;k++){ var yy=y-11+k*8; ctx.strokeRect(x-11,yy,22,6); ctx.fillRect(x-8,yy+2,2.5,2.5); }
  }
}
function makeWorldS4(color){
  var toks=null, spawn=0;
  return function(ctx,W,H,t,reduced){
    var trackY=H*0.66, x0=20, x1=W-20, topY=H*0.20, span=x1-x0, N=4;
    function depth(i){
      if(reduced) return [0.15,1,0.5,0.85][i];
      var cyc=2.8, ph=((t-i*(cyc/N))%cyc+cyc)%cyc, d=ph/cyc;
      if(d<0.22) return easeInOut(d/0.22);
      if(d<0.48) return 1;
      if(d<0.66) return 1-easeInOut((d-0.48)/0.18);
      return 0;
    }
    var leverX=[], deps=[];
    for(var i=0;i<N;i++){ leverX.push(x0+span*(i+1)/(N+1)); deps.push(depth(i)); }
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(x0,topY); ctx.lineTo(x1,topY); ctx.stroke();
    ctx.strokeStyle=PAL.grid; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(x0,trackY); ctx.lineTo(x1,trackY); ctx.stroke();
    if(!toks) toks=[];
    var speed=span/2.8;
    if(!reduced){ if(t-spawn>0.24){ spawn=t; toks.push({born:t}); } toks=toks.filter(function(tk){ return x0+(t-tk.born)*speed<x1+10; }); }
    else if(toks.length===0){ for(var j=0;j<7;j++) toks.push({born:-j*0.34}); }
    toks.forEach(function(tk){
      var tx=reduced? x0+(toks.indexOf(tk)+0.5)*span/7 : x0+(t-tk.born)*speed;
      for(var k=0;k<N;k++){ if(deps[k]>0.85 && tx>leverX[k]-6 && tx<leverX[k]+22){ tx=leverX[k]-6; break; } }
      ctx.fillStyle=color; ctx.fillRect(tx-3,trackY-3,6,6);
    });
    ctx.lineCap='butt';
    for(var m=0;m<N;m++){
      var lx=leverX[m], ry=lerp(topY+6, trackY+4, deps[m]);
      ctx.strokeStyle=PAL.red; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(lx,topY); ctx.lineTo(lx,ry); ctx.stroke();
      ctx.fillStyle=PAL.red; ctx.fillRect(lx-6, topY-5, 12, 6);
      ctx.fillRect(lx-4, ry-3, 8, 5);
    }
  };
}

}

/* renderCritical() removed 2026-06-28; mode parked in saved/critical-read.md (re-inline DATA.criticalRead from data/pathways-2040.json to restore) */

/* ===================== router + shell ===================== */
var MODES=[
  {id:'navigator', label:'Navigator'},
  {id:'worlds', label:'Worlds'},
  {id:'arc', label:'The Arc'},
  {id:'signals', label:'Signals'},
  {id:'sandbox', label:'Sandbox'}
];
var currentPath='';
function stripHash(h){ return String(h==null?'':h).replace(/^#\/?/,''); }
function go(path){
  renderPath(path);                         // render immediately; do not wait on hashchange
  try{ location.hash='#/'+path; }catch(e){}  // best-effort deep link / back-button support
}
function mount(node){ var app=document.getElementById('app'); clear(app); app.appendChild(node); }

function applyOwnParam(query){
  if(!query) return;
  var m=query.match(/own=([^&]*)/);
  if(!m) return;
  try{
    var obj=JSON.parse(decodeURIComponent(escape(atob(m[1]))));
    var cur=loadCustom();
    for(var k in obj){ cur[k]=obj[k]; }
    saveCustom(cur);
  }catch(e){}
}
function renderPath(raw){
  stopAllAnims();
  var h=stripHash(raw);
  var qi=h.indexOf('?'); var query=''; if(qi>=0){ query=h.slice(qi+1); h=h.slice(0,qi); }
  currentPath=h;
  var parts=h.split('/').filter(Boolean);
  applyOwnParam(query);
  var mode=parts[0]||'navigator';
  var node;
  if(mode==='world'){ state.mode='worlds'; state.worldId=parts[1]; node=renderWorld(parts[1]); }
  else if(mode==='worlds'){ state.mode='worlds'; node=renderWorldsIndex(); }
  else if(mode==='arc'){ state.mode='arc'; node=renderArc(); }
  else if(mode==='signals'){ state.mode='signals'; node=renderSignals(); }
  else if(mode==='sandbox'){ state.mode='sandbox'; node=renderSandbox(); }
  else { state.mode='navigator'; node=renderNavigator(); }
  mount(node);
  updateNav();
  try{ window.scrollTo(0,0); }catch(e){}
}
function route(){
  var h=''; try{ h=location.hash; }catch(e){}
  var p=stripHash(h); var qi=p.indexOf('?'); if(qi>=0) p=p.slice(0,qi);
  if(!p) p='navigator';
  if(p===currentPath) return;   // already rendered by go(); avoids double render
  renderPath(h||'navigator');
}
function updateNav(){
  var nav=document.getElementById('modeNav'); clear(nav);
  MODES.forEach(function(m,i){
    nav.appendChild(el('button',{class: state.mode===m.id?'active':'', onclick:function(){ go(m.id); }},
      el('span',{class:'n'}, '0'+(i+1)), m.label));
  });
}
/* buildFooter() removed 2026-06-28; footer + populator parked in saved/footer.md */

/* keyboard: 1-6 switch modes */
document.addEventListener('keydown', function(e){
  if(e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  var n=parseInt(e.key,10);
  if(n>=1 && n<=MODES.length){ go(MODES[n-1].id); }
});

/* init */
if(EMBED) document.body.classList.add('embed');
window.addEventListener('hashchange', route);
var startRaw='navigator';
try{ if(location.hash) startRaw=location.hash; }catch(e){}
renderPath(startRaw);
try{ if(!location.hash) location.hash='#/navigator'; }catch(e){}
</script>
